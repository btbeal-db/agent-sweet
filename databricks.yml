# Databricks Asset Bundles configuration for Agent Builder
#
# Deploy workflow:
#   1. Build the frontend:  cd frontend && npm run build
#   2. Deploy the bundle:   databricks bundle deploy -t dev
#
# The frontend must be built before deploying — the build output
# lives in backend/static/ and is served by FastAPI at runtime.
#
# Setup records are stored as workspace files in each user's own directory
# (via OBO token) — no extra permissions or SQL warehouse required.

bundle:
  name: agent-builder-app

resources:
  apps:
    agent_builder:
      name: agent-builder-${bundle.target}
      description: "Visual drag-and-drop LangGraph agent builder for Databricks"
      source_code_path: .
      config:
        command:
          - uvicorn
          - backend.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
      user_api_scopes:
        - sql
        - serving.serving-endpoints
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - vectorsearch.vector-search-endpoints
        - vectorsearch.vector-search-indexes
        - files.files

targets:
  dev:
    default: true
    # Workspace is resolved from your Databricks CLI auth config.
    # Run: databricks auth login --host https://your-workspace.cloud.databricks.com
