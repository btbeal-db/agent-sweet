# Databricks Asset Bundles configuration for AgentSweet
#
# Deploy workflow:
#   1. Build the frontend:  cd frontend && npm run build
#   2. Deploy the bundle:   databricks bundle deploy -t dev
#
# The frontend must be built before deploying — the build output
# lives in backend/static/ and is served by FastAPI at runtime.
#
# Setup records are stored inside the user's experiment directory as a
# workspace file (written by the SP which has Can Manage on the folder).

bundle:
  name: agent-sweet

resources:
  apps:
    agent_sweet:
      name: agent-sweet-${bundle.target}
      description: "AgentSweet — visual drag-and-drop LangGraph agent builder for Databricks"
      source_code_path: .
      config:
        command:
          - uvicorn
          - backend.main:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
      # Managed MCP scopes let the OBO token access VS, Genie, UC Functions,
      # and external MCP servers — no PAT required for preview.
      user_api_scopes:
        - mcp.functions
        - mcp.vectorsearch
        - mcp.genie
        - mcp.external
        - workspace.workspace

targets:
  dev:
    default: true
    # Workspace is resolved from your Databricks CLI auth config.
    # Run: databricks auth login --host https://your-workspace.cloud.databricks.com
