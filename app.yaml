command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
# DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET, and
# DATABRICKS_WORKSPACE_ID are automatically injected by the platform.
# The user's OBO token arrives in the x-forwarded-access-token request header.
