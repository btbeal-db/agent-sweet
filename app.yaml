command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
# DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET, and
# DATABRICKS_WORKSPACE_ID are automatically injected by the platform.
# The user's OBO token arrives in the x-forwarded-access-token request header.
#
# In production, SETUP_TABLE and SQL_WAREHOUSE_ID are set automatically by
# the bundle deploy (see databricks.yml config.env). For local dev, set them
# manually if you want setup to work:
# env:
#   - name: SETUP_TABLE
#     value: "main.agent_builder.agent_builder_user_setup"
#   - name: SQL_WAREHOUSE_ID
#     value: "your-warehouse-id"
