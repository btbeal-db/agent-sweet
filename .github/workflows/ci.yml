name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # NOTE: Backend tests are disabled in CI because Python dependencies
  # resolve through an internal PyPI proxy that GitHub runners cannot reach.
  # Run backend tests locally: uv run pytest -m "not integration"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check and build
        working-directory: frontend
        run: npm run build
